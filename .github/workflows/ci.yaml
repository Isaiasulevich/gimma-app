name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mobile-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Create .env (CI placeholder)
        run: |
          cat > .env <<EOF
          SUPABASE_URL=http://127.0.0.1:54321
          SUPABASE_ANON_KEY=ci-placeholder
          EOF
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://placeholder
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
